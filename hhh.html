<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OMNI-PRO V3.5 + RISK MANAGER</title>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --accent: #f0b90b; --up: #02c076; --down: #f84960; }
        body { background: var(--bg); color: #eaecef; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--card); border-radius: 12px; width: 420px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .header { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .price-display { font-size: 35px; font-weight: bold; color: var(--accent); text-align: center; margin: 15px 0; }
        
        /* قسم إدارة المخاطر */
        .risk-section { background: #2b3139; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .input-group { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        input { background: #12161c; border: 1px solid #474d57; color: white; border-radius: 4px; padding: 5px; width: 80px; text-align: center; }

        .btn-analyze { background: var(--accent); color: #000; border: none; padding: 18px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #signal-box { margin-top: 15px; padding: 15px; border-radius: 8px; text-align: center; display: none; border-left: 5px solid transparent; }
        .buy { background: rgba(2, 192, 118, 0.15); color: var(--up); border-color: var(--up); }
        .sell { background: rgba(248, 73, 96, 0.15); color: var(--down); border-color: var(--down); }
        .wait { background: #2b3139; color: #929aa5; border-color: #474d57; }
        
        .recommendation { font-size: 13px; margin-top: 10px; color: #f0b90b; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>OMNI-PRO AI</span>
        <span style="font-size: 10px; color: #02c076;">● LIVE MARKET</span>
    </div>

    <div class="risk-section">
        <div class="input-group">
            <span>رصيدك الكلي ($):</span>
            <input type="number" id="balance" value="100">
        </div>
        <div class="input-group">
            <span>نسبة المخاطرة (%):</span>
            <input type="number" id="risk-percent" value="2">
        </div>
        <div id="calc-result" class="recommendation">المبلغ المقترح للصفقة: 2$</div>
    </div>

    <div id="price" class="price-display">0.00000</div>

    <button class="btn-analyze" onclick="processTrade()">تحليل ودخول صفقة</button>

    <div id="signal-box"></div>
</div>

<script>
    let prices = [];
    const PERIOD = 14;

    // جلب الأسعار وتحديث الحاسبة
    async function getMarketData() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=EURUSDT');
            const data = await res.json();
            const p = parseFloat(data.price);
            document.getElementById('price').innerText = p.toFixed(5);
            prices.push(p);
            if (prices.length > 60) prices.shift();

            // تحديث المبلغ المقترح تلقائياً
            const bal = document.getElementById('balance').value;
            const risk = document.getElementById('risk-percent').value;
            document.getElementById('calc-result').innerText = `المبلغ المقترح للصفقة: ${(bal * (risk / 100)).toFixed(2)}$`;
        } catch (e) {}
    }
    setInterval(getMarketData, 1000);

    function calculateRSI(data) {
        let gains = 0, losses = 0;
        for (let i = data.length - PERIOD; i < data.length; i++) {
            let diff = data[i] - data[i - 1];
            diff >= 0 ? gains += diff : losses -= diff;
        }
        return 100 - (100 / (1 + (gains / losses)));
    }

    function processTrade() {
        const box = document.getElementById('signal-box');
        box.style.display = 'block';
        box.className = 'wait';
        box.innerHTML = "فحص السيولة والترند...";

        setTimeout(() => {
            if (prices.length < PERIOD + 1) {
                box.innerHTML = "انتظر تجميع البيانات...";
                return;
            }

            const rsi = calculateRSI(prices);
            const currentP = prices[prices.length - 1];
            const avgP = prices.slice(-10).reduce((a, b) => a + b) / 10;

            // استراتيجية احترافية: RSI + Price Action
            if (rsi <= 32 && currentP < avgP) {
                box.innerHTML = `<strong>إشارة شراء (CALL) 🟢</strong><br>الهدف: ارتداد من قاع<br>المبلغ: ${document.getElementById('calc-result').innerText.split(': ')[1]}`;
                box.className = 'buy';
            } 
            else if (rsi >= 68 && currentP > avgP) {
                box.innerHTML = `<strong>إشارة بيع (PUT) 🔴</strong><br>الهدف: تصحيح من قمة<br>المبلغ: ${document.getElementById('calc-result').innerText.split(': ')[1]}`;
                box.className = 'sell';
            } 
            else {
                box.innerHTML = "السوق غير واضح ⏳<br>تجنب الدخول الآن";
                box.className = 'wait';
            }
        }, 1200);
    }
</script>

</body>
</html>
